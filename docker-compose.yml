services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kauppalista
      POSTGRES_USER: kauppalista
      POSTGRES_PASSWORD: kauppalista
    ports:
      - "51110:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kauppalista -d kauppalista"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: ./infra/docker/api.Dockerfile
    environment:
      PORT: 51111
      DATABASE_URL: postgresql://kauppalista:kauppalista@postgres:5432/kauppalista
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "51111:51111"
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://127.0.0.1:51111/health').then((response) => { if (!response.ok) throw new Error(String(response.status)); })"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: ./infra/docker/web.Dockerfile
    environment:
      PORT: 51112
      NEXT_PUBLIC_API_BASE_URL: http://localhost:51111
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "51112:51112"
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://127.0.0.1:51112').then((response) => { if (!response.ok) throw new Error(String(response.status)); })"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: ./infra/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://kauppalista:kauppalista@postgres:5432/kauppalista
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
